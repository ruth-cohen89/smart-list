name: CI

# ─── Triggers ─────────────────────────────────────────────────────────────────
# Run on every push to every branch, and on every pull request.
# Concurrency: if a new run starts for the same ref, cancel the previous one
# so we never waste CI minutes on superseded commits.
on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. Lint · Test · Build ──────────────────────────────────────────────────
  # Runs on every branch push and every pull request.
  validate:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # caches ~/.npm between runs for the same lockfile

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # A dummy secret is enough — auth middleware is mocked in API tests
          # and unit tests never reach the JWT layer.
          JWT_SECRET: ci-test-secret-not-used-in-production

      - name: Build TypeScript
        run: npm run build

  # ── 2. Docker Build ─────────────────────────────────────────────────────────
  # Runs only when a commit lands on main (not on PRs targeting main).
  # Depends on `validate` so Docker is never built from a broken state.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag smartlist-api:${{ github.sha }} \
            --tag smartlist-api:latest \
            .
